{% extends 'core/base.html' %}
{% block title %}Login - DropShip PK{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <h2>Drop<span>Ship</span> PK</h2>
      <p>Login to your account</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">Login →</button>
    </form>
    <p style="text-align:center;margin-top:1.5rem;color:var(--gray);font-size:0.9rem">
      Don't have account? <a href="{% url 'register' %}" style="color:var(--primary);font-weight:600">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
