{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-lg" style="border-radius: 20px; overflow: hidden;">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h2 class="mb-0">Join EliteStore 🚀</h2>
                    <p class="mb-0 opacity-75">Start your dropshipping journey with us</p>
                </div>
                <div class="card-body p-5">
                    <form id="smartLeadForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" id="name" class="form-control form-control-lg" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" id="email" class="form-control form-control-lg" placeholder="john@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Phone Number</label>
                            <input type="text" id="phone" class="form-control form-control-lg" placeholder="+92 300 1234567" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">I want to join as a:</label>
                            <select id="user_type" class="form-select form-select-lg" required>
                                <option value="reseller">Reseller</option>
                                <option value="wholesaler">Wholesaler</option>
                                <option value="other">Other Inquiry</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Message (Optional)</label>
                            <textarea id="message" class="form-control" rows="3" placeholder="How can we help you?"></textarea>
                        </div>
                        <button type="submit" id="submitBtn" class="btn btn-primary btn-lg w-100 py-3 shadow-sm" style="border-radius: 12px; font-weight: 600;">
                            Send Inquiry ✨
                        </button>
                    </form>
                    <div id="successMsg" class="mt-4 text-center d-none">
                        <div class="alert alert-success border-0 shadow-sm" style="border-radius: 12px;">
                            ✅ Thank you! Our AI has received your request. We'll be in touch soon.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('smartLeadForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    const form = this;
    
    const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        user_type: document.getElementById('user_type').value,
        message: document.getElementById('message').value
    };

    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Processing...';
    submitBtn.disabled = true;

    try {
        const response = await fetch('/smart-lead-capture/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify(payload)
        });
        
        const data = await response.json();
        if (data.success) {
            form.classList.add('d-none');
            document.getElementById('successMsg').classList.remove('d-none');
        } else {
            alert('Error: ' + data.error);
        }
    } catch (error) {
        alert('Connectivity issue. Please try again.');
    } finally {
        submitBtn.innerHTML = 'Send Inquiry ✨';
        submitBtn.disabled = false;
    }
});
</script>

<style>
.bg-primary { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%) !important; }
.btn-primary { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); border: none; transition: all 0.3s; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); }
.form-control:focus, .form-select:focus { border-color: #4F46E5; box-shadow: 0 0 0 0.25rem rgba(79, 70, 229, 0.1); }
</style>
{% endblock %}
