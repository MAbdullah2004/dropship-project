{% extends 'core/base.html' %}
{% block title %}Login — EliteStore{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-text"><span style="color:var(--primary)">Elite</span><span style="color:var(--accent)">Store</span></div>
      <p>Reseller & Wholesaler Login</p>
    </div>

    <div style="background:var(--primary-light);border:1px solid rgba(124,58,237,0.2);border-radius:10px;padding:0.8rem 1rem;margin-bottom:1.5rem;font-size:0.82rem;color:var(--primary-dark);display:flex;align-items:center;gap:8px;">
      <span style="font-size:1.1rem;">ℹ️</span>
      <span>This login is for <strong>Resellers</strong> and <strong>Wholesalers</strong> only.
      Admin? <a href="{% url 'admin_login' %}" style="color:var(--primary);font-weight:700;">Click here →</a></span>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_username">Username</label>
        <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter your username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="id_password">Password</label>
        <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:0.5rem;">Sign In →</button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;color:var(--gray);font-size:0.88rem;">
      Don't have an account? <a href="{% url 'register' %}" style="color:var(--primary);font-weight:600;">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
